<!DOCTYPE html>
<html>
<head>
  <title>F&O Heatmap</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #000; /* Matching your screenshot black */
      color: white;
      padding: 10px;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
      font-size: 1.2rem;
    }

    .sector-row, .heatmap {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      margin-bottom: 25px;
    }

    .tile {
      padding: 12px 4px;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
      font-size: 10px; /* Smaller font to prevent overflow like in your screenshot */
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 50px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<h2>Sector Strength vs Nifty (7D)</h2>
<div class="sector-row" id="sectorHeatmap"></div>

<h2>F&O Heatmap</h2>
<div class="heatmap" id="heatmap"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBqvl7N6mw6BPqwwWcVZeUwnrhpAcsCnxK6eEgG4eUlBDuwG8vHkja81WaZP8CWTDLwS7wmg4Vkbc_/pub?output=csv";
const sectorURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBqvl7N6mw6BPqwwWcVZeUwnrhpAcsCnxK6eEgG4eUlBDuwG8vHkja81WaZP8CWTDLwS7wmg4Vkbc_/pub?gid=823250088&single=true&output=csv";

function getColor(change) {
    if (change >= 3) return { bg: "#006400", text: "white" }; // Deep Green
    if (change >= 1) return { bg: "#228B22", text: "white" }; // Green
    if (change > 0) return { bg: "#90EE90", text: "black" };  // Light Green
    if (change > -1) return { bg: "#ffb3b3", text: "black" }; // Light Red
    if (change > -3) return { bg: "#ff4d4d", text: "white" }; // Red
    return { bg: "#8b0000", text: "white" };                 // Deep Red
}

function loadSectorHeatmap() {
    fetch(sectorURL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {
        // Fix: Split by \r\n to handle Windows/Google formatting properly
        const rows = data.trim().split(/\r?\n/).slice(1);
        let rawData = []; // Corrected naming
        let niftyChange = 0;

        rows.forEach(row => {
            const cols = row.split(",");
            const sector = cols[0]?.trim();
            // Fix: Remove % and clean whitespace before parsing
            const change = parseFloat(cols[1]?.replace("%","").trim());

            if (sector && !isNaN(change)) {
                rawData.push({ sector, change });
                if (sector.toUpperCase() === "NIFTY 50") {
                    niftyChange = change;
                }
            }
        });

        const sectors = rawData
            .filter(item => item.sector.toUpperCase() !== "NIFTY 50")
            .map(item => ({
                sector: item.sector,
                perf: item.change - niftyChange
            }))
            .sort((a, b) => b.perf - a.perf); // Sorting descending

        const container = document.getElementById("sectorHeatmap");
        container.innerHTML = "";

        sectors.forEach(sec => {
            const colors = getColor(sec.perf);
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.background = colors.bg;
            tile.style.color = colors.text;
            tile.innerHTML = `<span>${sec.sector}</span><span>${sec.perf.toFixed(2)}%</span>`;
            container.appendChild(tile);
        });
    });
}

function loadHeatmap() {
    fetch(sheetURL + "&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {
        const rows = data.trim().split(/\r?\n/).slice(1);
        let stocks = rows.map(row => {
            const cols = row.split(",");
            return {
                symbol: cols[0]?.trim(),
                change: parseFloat(cols[1]?.replace("%","").trim())
            };
        }).filter(s => s.symbol && !isNaN(s.change));

        stocks.sort((a, b) => b.change - a.change);

        const container = document.getElementById("heatmap");
        container.innerHTML = "";

        stocks.forEach(stock => {
            const colors = getColor(stock.change);
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.style.background = colors.bg;
            tile.style.color = colors.text;
            tile.innerHTML = `<span>${stock.symbol}</span><span>${stock.change.toFixed(2)}%</span>`;
            container.appendChild(tile);
        });
    });
}

loadSectorHeatmap();
loadHeatmap();

setInterval(() => {
    loadSectorHeatmap();
    loadHeatmap();
}, 30000);
</script>

</body>
</html>
