<!DOCTYPE html>
<html>
<head>
  <title>F&O Heatmap</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .tile {
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      color: white;
    }
  </style>
</head>
<body>

<h2>F&O Heatmap</h2>
<div class="heatmap" id="heatmap"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/193vN5jxcBdPDxOvKwyU5AlkQnV8AnD8HcjZkYg2_Iwc/edit?gid=0#gid=0";

function getColor(change) {
  if (change > 5) return "#006400";
  if (change > 2) return "#228B22";
  if (change > 0) return "#90EE90";
  if (change > -2) return "#ffb3b3";
  if (change > -5) return "#ff4d4d";
  return "#8b0000";
}

fetch(sheetURL)
.then(res => res.text())
.then(data => {
    const rows = data.split("\n").slice(1);
    const heatmap = document.getElementById("heatmap");

    rows.forEach(row => {
        const [symbol, change] = row.split(",");
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.style.background = getColor(parseFloat(change));
        tile.innerHTML = `${symbol}<br>${change}%`;
        heatmap.appendChild(tile);
    });
});
</script>

</body>
</html>
